<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BD Contact Radar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080A0F;--surface:#0E1118;--surface2:#151820;--surface3:#1C2030;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#F2F0E8;--muted:#7A7D8A;--dim:#3A3D4A;
  --gold:#D4A843;--gold2:#F0C060;--gold-dim:rgba(212,168,67,0.1);--gold-border:rgba(212,168,67,0.25);
  --teal:#3ECFB0;--teal-dim:rgba(62,207,176,0.1);
  --red:#E05C5C;--red-dim:rgba(224,92,92,0.08);
  --blue:#5B9CF6;--blue-dim:rgba(91,156,246,0.1);
  --amber:#F0A030;
}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 20%,rgba(212,168,67,0.04) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 10% 80%,rgba(62,207,176,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh}

/* Header */
.header{padding:20px 20px 0;display:flex;align-items:flex-start;justify-content:space-between}
.eyebrow{font-family:monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.title{font-size:22px;font-weight:800;line-height:1.1}
.title span{color:var(--gold)}
.badge{background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:20px;padding:4px 12px;font-family:monospace;font-size:11px;color:var(--gold);margin-top:4px;display:inline-block}

/* Sync status */
.sync-bar{display:flex;align-items:center;gap:8px;padding:6px 20px;font-family:monospace;font-size:10px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--dim)}
.sync-dot.ok{background:var(--teal)}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-top:12px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 18px;border-bottom:2px solid transparent;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;transition:color .2s,border-color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Pages */
.page{display:none;padding:16px 20px 100px}
.page.active{display:block}

/* Scan zone */
.scan-zone{border:2px dashed var(--gold-border);border-radius:16px;padding:28px 20px;text-align:center;background:var(--gold-dim);cursor:pointer;margin-bottom:12px;position:relative;overflow:hidden}
.scan-zone:hover{background:rgba(212,168,67,.15)}
#cameraInput{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.scan-icon{font-size:36px;margin-bottom:8px;display:block}
.scan-title{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:4px}
.scan-sub{font-size:12px;color:var(--muted)}

/* Preview */
.preview-wrap{position:relative;margin-bottom:12px;display:none}
.preview-wrap.vis{display:block}
.preview-img{width:100%;border-radius:12px;border:1px solid var(--border2);max-height:160px;object-fit:cover;display:block}
.clear-btn{position:absolute;top:8px;right:8px;background:var(--bg);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:monospace}

/* Form elements */
.flabel{font-family:monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
.finput{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.finput:focus{border-color:var(--gold-border)}
textarea.finput{resize:vertical;min-height:52px}
.fgroup{margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.full{grid-column:1/-1}

/* Source buttons */
.source-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.src-btn{font-family:monospace;font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.src-btn.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}

/* Main button */
.btn-main{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,transform .1s}
.btn-main:hover{background:var(--gold2)}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{background:var(--dim);color:var(--muted);cursor:not-allowed}
.btn-ghost{width:100%;background:var(--surface3);color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn-teal{width:100%;background:var(--teal-dim);color:var(--teal);border:1px solid rgba(62,207,176,.3);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}

/* Progress */
.progress-row{display:flex;gap:6px;margin:10px 0 4px}
.pstep{flex:1;height:3px;border-radius:2px;background:var(--surface3);transition:background .4s}
.pstep.done{background:var(--gold)}
.pstep.act{background:var(--amber);animation:pulse 1s infinite}
.status-txt{font-family:monospace;font-size:11px;color:var(--muted);text-align:center;min-height:18px;margin-bottom:8px}

/* Divider */
.divider{display:flex;align-items:center;gap:10px;margin:10px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.divider span{font-family:monospace;font-size:9px;color:var(--dim)}
.manual-toggle{text-align:center;font-family:monospace;font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;margin:4px 0 8px}

/* Extracted card */
.ext-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:14px;margin:12px 0;display:none}
.ext-card.vis{display:block}
.ext-label{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}

/* Analysis box */
.analysis-box{background:var(--surface2);border:1px solid var(--gold-border);border-radius:12px;padding:14px;margin-top:12px;display:none}
.analysis-box.vis{display:block}
.analysis-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.analysis-lbl{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.score-num{font-family:monospace;font-size:24px;font-weight:500}
.score-num small{font-size:11px;color:var(--muted)}
.analysis-body{font-size:13px;color:var(--text);line-height:1.65}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.atag{font-family:monospace;font-size:9px;padding:3px 8px;border-radius:4px;display:inline-block}
.tag-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,156,246,.25)}
.tag-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(62,207,176,.25)}
.tag-gold{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.tag-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(224,92,92,.25)}

/* Contacts */
.search-inp{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px;font-family:inherit}
.search-inp::placeholder{color:var(--dim)}
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{font-family:monospace;font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn.active{background:var(--surface2);color:var(--text)}
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;border-left:3px solid var(--dim)}
.contact-card.hot{border-left-color:var(--gold)}
.contact-card.warm{border-left-color:var(--amber)}
.contact-card.cold{border-left-color:var(--blue)}
.contact-card:hover{border-color:var(--border2)}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.c-name{font-size:15px;font-weight:700}
.c-score{font-family:monospace;font-size:13px;font-weight:500}
.c-co{font-size:13px;font-weight:600}
.c-role{font-size:12px;color:var(--muted);margin-bottom:6px}
.c-meta{display:flex;flex-wrap:wrap;gap:4px}
.cmeta{font-family:monospace;font-size:9px;padding:2px 7px;border-radius:3px;background:var(--surface3);color:var(--muted)}
.c-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.c-detail.open{display:block}
.c-detail p{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:4px}
.del-btn{font-family:monospace;font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid rgba(224,92,92,.3);background:transparent;color:var(--red);cursor:pointer;margin-top:10px}

/* Export button */
.export-btn{width:100%;background:var(--surface2);color:var(--teal);border:1px solid rgba(62,207,176,.3);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.export-btn:hover{background:var(--teal-dim)}

/* Summary */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-lbl{font-family:monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.priority-card{background:var(--surface);border:1px solid var(--gold-border);border-radius:12px;padding:14px;margin-bottom:10px}
.priority-title{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.p-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.p-row:last-child{border-bottom:none}
.p-name{font-weight:600}
.p-co{font-size:11px;color:var(--muted)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.6}
.empty-icon{font-size:32px;margin-bottom:10px}

/* Loading dots */
.dots{display:inline-flex;gap:4px;align-items:center}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--bg);animation:pulse 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="eyebrow">BD Intelligence</div>
      <div class="title">Contact <span>Radar</span></div>
    </div>
    <div><div class="badge" id="totalBadge">0 contacts</div></div>
  </div>

  <!-- Sync status -->
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncTxt" style="color:var(--muted)">Not connected to Dropbox</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('scan',this)">📷 Scan</button>
    <button class="tab" onclick="showTab('contacts',this)">Contacts</button>
    <button class="tab" onclick="showTab('summary',this)">Summary</button>
  </div>

  <!-- SCAN TAB -->
  <div class="page active" id="tab-scan">

    <!-- Camera zone -->
    <div class="scan-zone" id="scanZone">
      <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleImage(event)">
      <span class="scan-icon">📷</span>
      <div class="scan-title">Photograph Namecard</div>
      <div class="scan-sub">Tap to open camera · or pick from photos</div>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" class="preview-img" src="" alt="">
      <button class="clear-btn" onclick="clearAll()">✕ Clear</button>
    </div>

    <!-- Source -->
    <div class="fgroup">
      <label class="flabel">Met at</label>
      <div class="source-row" id="sourceRow">
        <button class="src-btn active" onclick="setSource(this,'TFB Event')">TFB Event</button>
        <button class="src-btn" onclick="setSource(this,'FM Summit')">FM Summit</button>
        <button class="src-btn" onclick="setSource(this,'LinkedIn')">LinkedIn</button>
        <button class="src-btn" onclick="setSource(this,'Referral')">Referral</button>
        <button class="src-btn" onclick="setSource(this,'Other')">Other</button>
      </div>
    </div>

    <!-- Notes -->
    <div class="fgroup">
      <label class="flabel">Quick notes (optional)</label>
      <textarea id="f_notes" class="finput" placeholder="e.g. interested in Pelican, currently uses Brokeree, follow up next week..."></textarea>
    </div>

    <!-- Scan button -->
    <button class="btn-main" id="scanBtn" onclick="processCard()">
      <span id="scanBtnTxt">✦ Scan &amp; Analyse</span>
    </button>

    <!-- Progress -->
    <div class="progress-row" id="progressRow" style="display:none">
      <div class="pstep" id="ps1"></div>
      <div class="pstep" id="ps2"></div>
      <div class="pstep" id="ps3"></div>
    </div>
    <div class="status-txt" id="statusTxt"></div>

    <!-- Manual entry -->
    <div class="divider"><span>or enter manually</span></div>
    <div class="manual-toggle" onclick="toggleManual()">▸ Type details instead</div>
    <div id="manualFields" style="display:none">
      <div class="grid2">
        <div><label class="flabel">First Name *</label><input class="finput" id="m_fname" placeholder="Argyri"></div>
        <div><label class="flabel">Last Name</label><input class="finput" id="m_lname" placeholder="Manglari"></div>
        <div class="full"><label class="flabel">Company *</label><input class="finput" id="m_company" placeholder="Tools for Brokers"></div>
        <div class="full"><label class="flabel">Job Title *</label><input class="finput" id="m_title" placeholder="Head of APAC BD"></div>
        <div><label class="flabel">Email</label><input class="finput" id="m_email" placeholder="a@tfb.com"></div>
        <div><label class="flabel">Phone</label><input class="finput" id="m_phone" placeholder="+65..."></div>
      </div>
      <button class="btn-ghost" id="manualBtn" onclick="runManual()">✦ Analyse</button>
    </div>

    <!-- Extracted fields -->
    <div class="ext-card" id="extCard">
      <div class="ext-label">✓ Extracted — edit if needed</div>
      <div class="grid2">
        <div><label class="flabel">First Name</label><input class="finput" id="e_fname"></div>
        <div><label class="flabel">Last Name</label><input class="finput" id="e_lname"></div>
        <div class="full"><label class="flabel">Company</label><input class="finput" id="e_company"></div>
        <div class="full"><label class="flabel">Job Title</label><input class="finput" id="e_title"></div>
        <div><label class="flabel">Email</label><input class="finput" id="e_email"></div>
        <div><label class="flabel">Phone</label><input class="finput" id="e_phone"></div>
        <div class="full"><label class="flabel">Website</label><input class="finput" id="e_web"></div>
      </div>
    </div>

    <!-- Analysis result -->
    <div class="analysis-box" id="analysisBox">
      <div class="analysis-hdr">
        <div class="analysis-lbl">AI Assessment</div>
        <div class="score-num" id="scoreNum">—<small>/10</small></div>
      </div>
      <div class="analysis-body" id="analysisBody"></div>
      <div class="tags-row" id="tagsRow"></div>
      <button class="btn-teal" onclick="saveContact()">↓ Save to Contacts</button>
    </div>

  </div>

  <!-- CONTACTS TAB -->
  <div class="page" id="tab-contacts">
    <button class="export-btn" onclick="exportExcel()">📊 Export to Excel (.xlsx)</button>
    <input class="search-inp" type="text" placeholder="Search contacts..." oninput="renderContacts(this.value)">
    <div class="filter-row">
      <button class="fbtn active" onclick="setFilter(this,'all')">All</button>
      <button class="fbtn" onclick="setFilter(this,'hot')">🔥 Hot</button>
      <button class="fbtn" onclick="setFilter(this,'warm')">⚡ Warm</button>
      <button class="fbtn" onclick="setFilter(this,'cold')">❄️ Cold</button>
      <button class="fbtn" onclick="setFilter(this,'broker')">Broker</button>
      <button class="fbtn" onclick="setFilter(this,'tech')">Tech</button>
      <button class="fbtn" onclick="setFilter(this,'lp')">LP</button>
    </div>
    <div id="contactsList"></div>
  </div>

  <!-- SUMMARY TAB -->
  <div class="page" id="tab-summary">
    <div id="summaryContent"></div>
  </div>

</div>

// ─── DROPBOX ──────────────────────────────────────────────
async function dbxLoad() {
  setSyncStatus('syncing', 'Loading from Dropbox...');
  try {
    const r = await fetch('https://content.dropboxapi.com/2/files/download', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + DROPBOX_TOKEN,
        'Dropbox-API-Arg': JSON.stringify({path: DROPBOX_PATH})
      }
    });
    if (r.status === 409) { contacts = []; setSyncStatus('ok', 'Dropbox connected · 0 contacts'); return; }
    if (!r.ok) throw new Error('Load failed');
    contacts = await r.json();
    setSyncStatus('ok', 'Dropbox connected · ' + contacts.length + ' contacts');
    updateBadge();
  } catch(e) {
    // Fallback to localStorage
    try { contacts = JSON.parse(localStorage.getItem('bd_contacts') || '[]'); } catch { contacts = []; }
    setSyncStatus('err', 'Dropbox error · using local storage');
  }
}

async function dbxSave() {

        'Authorization': 'Bearer ' + DROPBOX_TOKEN,
        'Dropbox-API-Arg': JSON.stringify({path: DROPBOX_PATH, mode: 'overwrite', autorename: false}),
        'Content-Type': 'application/octet-stream'
      },
      body: JSON.stringify(contacts)
    });
    if (!r.ok) throw new Error('Save failed');
    localStorage.setItem('bd_contacts', JSON.stringify(contacts));
    setSyncStatus('ok', 'Saved to Dropbox · ' + contacts.length + ' contacts');
  } catch(e) {
    localStorage.setItem('bd_contacts', JSON.stringify(contacts));
    setSyncStatus('err', 'Dropbox error · saved locally');
  }
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
  txt.style.color = state === 'ok' ? 'var(--teal)' : state === 'err' ? 'var(--red)' : 'var(--amber)';
}

// ─── CLAUDE API ───────────────────────────────────────────
function extractJSON(text) {
  const clean = text.replace(/```json|```/g,'').trim();
  try { return JSON.parse(clean); } catch {}
  const s = clean.indexOf('{'), e = clean.lastIndexOf('}');
  if (s!==-1 && e!==-1) try { return JSON.parse(clean.slice(s,e+1)); } catch {}
  const g = k => { const m = clean.match(new RegExp(`"${k}"\\s*:\\s*"([^"]*)"`,'i')); return m?m[1]:''; };
  const gn = k => { const m = clean.match(new RegExp(`"${k}"\\s*:\\s*(\\d+)`,'i')); return m?parseInt(m[1]):5; };
  const ga = k => { const m = clean.match(new RegExp(`"${k}"\\s*:\\s*\\[([^\\]]+)\\]`,'i')); if(!m) return []; return m[1].match(/"([^"]+)"/g)?.map(s=>s.replace(/"/g,''))||[]; };
  return {fname:g('fname'),lname:g('lname'),company:g('company'),title:g('title'),email:g('email'),phone:g('phone'),website:g('website'),score:gn('score'),tier:g('tier')||'warm',category:g('category')||'other',summary:g('summary')||'Analysis complete.',next_action:g('next_action')||'Follow up',tags:ga('tags'),pelican_fit:g('pelican_fit')||'maybe',tc_fit:g('tc_fit')||'maybe',urgency:g('urgency')||'this month'};
}

async function callClaude(messages, maxTokens=800) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,messages})
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error.message);
  return d.content[0].text;
}

// ─── IMAGE HANDLING ───────────────────────────────────────
function handleImage(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const result = ev.target.result;
    document.getElementById('previewImg').src = result;
    document.getElementById('previewWrap').classList.add('vis');
    document.getElementById('scanZone').style.display = 'none';
    // Detect mime type
    const mime = result.split(';')[0].split(':')[1] || 'image/jpeg';
    imageBase64 = result.split(',')[1];
    window._imgMime = mime;
  };
  reader.readAsDataURL(file);
}

function clearAll() {
  imageBase64 = null; currentAnalysis = null; currentExtracted = null;
  document.getElementById('previewWrap').classList.remove('vis');
  document.getElementById('scanZone').style.display = '';
  document.getElementById('cameraInput').value = '';
  document.getElementById('extCard').classList.remove('vis');
  document.getElementById('analysisBox').classList.remove('vis');
  document.getElementById('progressRow').style.display = 'none';
  document.getElementById('statusTxt').textContent = '';
  document.getElementById('f_notes').value = '';
  setStep(0);
}

// ─── SCAN FLOW ────────────────────────────────────────────
async function processCard() {
  if (!imageBase64) { alert('Please photograph a namecard first'); return; }
  setBusy(true);
  setStep(1, 'act');
  document.getElementById('progressRow').style.display = 'flex';
  document.getElementById('statusTxt').textContent = 'Reading namecard...';
  document.getElementById('extCard').classList.remove('vis');
  document.getElementById('analysisBox').classList.remove('vis');

  try {
    const mime = window._imgMime || 'image/jpeg';
    const extractText = await callClaude([{
      role:'user',
      content:[
        {type:'image',source:{type:'base64',media_type:mime,data:imageBase64}},
        {type:'text',text:'Extract all contact info from this business card. Return ONLY a JSON object with keys: fname, lname, company, title, email, phone, website, linkedin. Use empty string if not visible. No markdown.'}
      ]
    }], 400);

    const ext = extractJSON(extractText);
    currentExtracted = ext;
    ['fname','lname','company','title','email','phone','web'].forEach(k => {
      const el = document.getElementById('e_'+k);
      if (el) el.value = ext[k==='web'?(ext.website||ext.linkedin||''):k] || '';
    });
    document.getElementById('e_web').value = ext.website || ext.linkedin || '';
    document.getElementById('extCard').classList.add('vis');
    setStep(1,'done'); setStep(2,'act');
    document.getElementById('statusTxt').textContent = 'Analysing BD potential...';
    await runAnalysis();

  } catch(err) {
    document.getElementById('statusTxt').textContent = 'Error: ' + err.message;
    setStep(0);
  }
  setBusy(false);
}

async function runManual() {
  const fname = document.getElementById('m_fname').value.trim();
  const company = document.getElementById('m_company').value.trim();
  const title = document.getElementById('m_title').value.trim();
  if (!fname||!company||!title) { alert('Please fill First Name, Company and Job Title'); return; }
  currentExtracted = {
    fname, lname:document.getElementById('m_lname').value.trim(),
    company, title,
    email:document.getElementById('m_email').value.trim(),
    phone:document.getElementById('m_phone').value.trim(), website:''
  };
  ['fname','lname','company','title','email','phone'].forEach(k=>{
    const el=document.getElementById('e_'+k); if(el) el.value=currentExtracted[k]||'';
  });
  document.getElementById('e_web').value='';
  document.getElementById('extCard').classList.add('vis');
  document.getElementById('progressRow').style.display='flex';
  setStep(1,'done'); setStep(2,'act');
  document.getElementById('statusTxt').textContent='Analysing BD potential...';
  document.getElementById('analysisBox').classList.remove('vis');
  const btn=document.getElementById('manualBtn'); btn.disabled=true;
  try { await runAnalysis(); } catch(e){ document.getElementById('statusTxt').textContent='Error: '+e.message; }
  btn.disabled=false;
}

async function runAnalysis() {
  const fname=document.getElementById('e_fname').value||currentExtracted?.fname||'';
  const lname=document.getElementById('e_lname').value||currentExtracted?.lname||'';
  const company=document.getElementById('e_company').value||currentExtracted?.company||'';
  const title=document.getElementById('e_title').value||currentExtracted?.title||'';
  const notes=document.getElementById('f_notes').value.trim();

  const prompt=`You are a BD analyst for TransactCloud and Pelican.
TransactCloud: Singapore FX/CFD broker infrastructure (FIX bridging, CRM, MAM/copy trading ops).
Pelican: FCA-regulated copy trading platform. IC Markets, Pepperstone, Deriv, Vantage, 58+ brokers. Expanding in SEA vs Brokeree.

Return ONLY a JSON object, no markdown:
{"score":7,"tier":"warm","category":"broker","summary":"2-3 sentence analysis","next_action":"Specific next step","tags":["tag1","tag2","tag3"],"pelican_fit":"yes","tc_fit":"maybe","urgency":"this week"}

tier: hot(8-10), warm(5-7), cold(1-4)
category: broker|tech|lp|crm|media|other
pelican_fit/tc_fit: yes|maybe|no
urgency: this week|this month|low

Contact: ${fname} ${lname} | ${company} | ${title}
Met at: ${currentSource}
Notes: ${notes||'none'}`;

  const txt = await callClaude([{role:'user',content:prompt}], 600);
  const result = extractJSON(txt);

  currentAnalysis = {
    ...currentExtracted,
    fname:document.getElementById('e_fname').value||fname,
    lname:document.getElementById('e_lname').value||lname,
    company:document.getElementById('e_company').value||company,
    title:document.getElementById('e_title').value||title,
    email:document.getElementById('e_email').value||'',
    phone:document.getElementById('e_phone').value||'',
    website:document.getElementById('e_web').value||'',
    ...result,
    source:currentSource,
    notes:document.getElementById('f_notes').value.trim(),
    id:Date.now(),
    savedAt:new Date().toLocaleDateString('en-GB')
  };

  setStep(2,'done'); setStep(3,'done');
  document.getElementById('statusTxt').textContent='';

  const tierColor = result.tier==='hot'?'var(--gold2)':result.tier==='warm'?'var(--amber)':'var(--blue)';
  document.getElementById('scoreNum').innerHTML=`${result.score}<small>/10</small>`;
  document.getElementById('scoreNum').style.color=tierColor;
  const urgIcon=result.urgency==='this week'?'🔴':result.urgency==='this month'?'🟡':'🔵';
  const urgTxt=result.urgency==='this week'?'Follow up this week':result.urgency==='this month'?'Follow up this month':'Low urgency';
  document.getElementById('analysisBody').innerHTML=`<span style="font-family:monospace;font-size:11px;color:var(--muted)">${urgIcon} ${urgTxt}</span><br><br><strong style="color:var(--text)">Next: ${result.next_action}</strong><br><br><span style="color:var(--muted)">${result.summary}</span>`;
  const tr=document.getElementById('tagsRow'); tr.innerHTML='';
  (result.tags||[]).forEach(t=>{ const s=document.createElement('span'); s.className='atag tag-blue'; s.textContent=t; tr.appendChild(s); });
  if(result.pelican_fit==='yes'){const s=document.createElement('span');s.className='atag tag-teal';s.textContent='✓ Pelican fit';tr.appendChild(s);}
  if(result.tc_fit==='yes'){const s=document.createElement('span');s.className='atag tag-gold';s.textContent='✓ TC fit';tr.appendChild(s);}
  document.getElementById('analysisBox').classList.add('vis');
}

async function saveContact() {
  if (!currentAnalysis) return;
  contacts.unshift(currentAnalysis);
  updateBadge();
  await dbxSave();
  clearAll();
  showTab('contacts', document.querySelectorAll('.tab')[1]);
  renderContacts();
}

// ─── EXCEL EXPORT ─────────────────────────────────────────
function exportExcel() {
  if (!contacts.length) { alert('No contacts to export'); return; }
  const headers = ['First Name','Last Name','Company','Job Title','Email','Phone','Website','Score','Tier','Category','Pelican Fit','TC Fit','Urgency','Next Action','AI Summary','Met At','Notes','Date Added'];
  const rows = contacts.map(c => [
    c.fname||'', c.lname||'', c.company||'', c.title||'',
    c.email||'', c.phone||'', c.website||'',
    c.score||'', c.tier||'', c.category||'',
    c.pelican_fit||'', c.tc_fit||'', c.urgency||'',
    c.next_action||'', c.summary||'',
    c.source||'', c.notes||'', c.savedAt||''
  ]);

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  // Column widths
  ws['!cols'] = [
    {wch:12},{wch:12},{wch:22},{wch:24},{wch:26},{wch:14},{wch:22},
    {wch:7},{wch:7},{wch:10},{wch:12},{wch:8},{wch:12},
    {wch:35},{wch:50},{wch:12},{wch:30},{wch:12}
  ];

  // Freeze header row
  ws['!freeze'] = {xSplit:0, ySplit:1, topLeftCell:'A2', activePane:'bottomLeft', state:'frozen'};

  XLSX.utils.book_append_sheet(wb, ws, 'BD Contacts');
  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `BD-Contacts-${date}.xlsx`);
}

// ─── UI HELPERS ───────────────────────────────────────────
function setStep(n, state) {
  if(n===0){['ps1','ps2','ps3'].forEach(id=>document.getElementById(id).className='pstep');return;}
  ['ps1','ps2','ps3'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.className='pstep'+(i+1<n?' done':i+1===n?' '+state:'');
  });
}

function setBusy(b) {
  const btn=document.getElementById('scanBtn');
  const txt=document.getElementById('scanBtnTxt');
  btn.disabled=b;
  txt.innerHTML=b?'<div class="dots"><span></span><span></span><span></span></div>':'✦ Scan &amp; Analyse';
}

function setSource(btn, val) {
  document.querySelectorAll('.src-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentSource=val;
}

function showTab(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='contacts') renderContacts();
  if(id==='summary') renderSummary();
}

function setFilter(btn, val) {
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter=val;
  renderContacts(document.querySelector('.search-inp')?.value||'');
}

function toggleManual() {
  const mf=document.getElementById('manualFields');
  const open=mf.style.display==='none';
  mf.style.display=open?'block':'none';
  document.querySelector('.manual-toggle').textContent=(open?'▾':'▸')+' Type details instead';
}

function updateBadge() {
  document.getElementById('totalBadge').textContent=contacts.length+' contact'+(contacts.length!==1?'s':'');
}

function tierColor(t){ return t==='hot'?'var(--gold)':t==='warm'?'var(--amber)':'var(--blue)'; }
function tierIcon(t){ return t==='hot'?'🔥':t==='warm'?'⚡':'❄️'; }

// ─── CONTACTS LIST ────────────────────────────────────────
function renderContacts(search='') {
  const list=document.getElementById('contactsList');
  let filtered=contacts;
  if(currentFilter!=='all') filtered=filtered.filter(c=>c.tier===currentFilter||c.category===currentFilter);
  if(search){const s=search.toLowerCase();filtered=filtered.filter(c=>(c.fname+' '+c.lname+c.company+c.title).toLowerCase().includes(s));}
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">${contacts.length?'🔍':'📇'}</div>${contacts.length?'No contacts match this filter':'No contacts yet. Scan your first namecard!'}</div>`;
    return;
  }
  list.innerHTML=filtered.map(c=>`
    <div class="contact-card ${c.tier||'cold'}" onclick="toggleCard(${c.id})">
      <div class="c-top"><div class="c-name">${c.fname||''} ${c.lname||''}</div><div class="c-score" style="color:${tierColor(c.tier)}">${tierIcon(c.tier)} ${c.score||'?'}/10</div></div>
      <div class="c-co">${c.company||''}</div>
      <div class="c-role">${c.title||''}</div>
      <div class="c-meta">
        ${(c.tags||[]).slice(0,3).map(t=>`<span class="cmeta">${t}</span>`).join('')}
        ${c.pelican_fit==='yes'?'<span class="cmeta" style="background:var(--teal-dim);color:var(--teal)">Pelican</span>':''}
        <span class="cmeta">${c.source||''}</span>
        <span class="cmeta">${c.savedAt||''}</span>
      </div>
      <div class="c-detail" id="det-${c.id}">
        <p>${c.summary||''}</p>
        <p style="color:var(--gold);margin-top:6px"><strong>Next:</strong> ${c.next_action||''}</p>
        ${c.email?`<p>✉ ${c.email}</p>`:''}
        ${c.phone?`<p>📞 ${c.phone}</p>`:''}
        ${c.website?`<p>🔗 ${c.website}</p>`:''}
        ${c.notes?`<p style="color:var(--dim);margin-top:4px">Notes: ${c.notes}</p>`:''}
        <button class="del-btn" onclick="deleteContact(event,${c.id})">Delete</button>
      </div>
    </div>`).join('');
}

function toggleCard(id){ const d=document.getElementById('det-'+id); if(d) d.classList.toggle('open'); }

function deleteContact(e,id){
  e.stopPropagation();
  if(!confirm('Delete this contact?')) return;
  contacts=contacts.filter(c=>c.id!==id);
  updateBadge();
  dbxSave();
  renderContacts();
}

// ─── SUMMARY ──────────────────────────────────────────────
function renderSummary(){
  const el=document.getElementById('summaryContent');
  if(!contacts.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div>Add contacts to see your pipeline summary</div>';return;}
  const hot=contacts.filter(c=>c.tier==='hot');
  const warm=contacts.filter(c=>c.tier==='warm');
  const pel=contacts.filter(c=>c.pelican_fit==='yes');
  const urg=contacts.filter(c=>c.urgency==='this week');
  const top=[...contacts].sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,5);
  const cats=['broker','tech','lp','crm','media','other'];
  el.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" style="color:var(--gold)">${hot.length}</div><div class="stat-lbl">🔥 Hot</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--amber)">${warm.length}</div><div class="stat-lbl">⚡ Warm</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--teal)">${pel.length}</div><div class="stat-lbl">Pelican fits</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--red)">${urg.length}</div><div class="stat-lbl">🔴 Urgent</div></div>
    </div>
    <div class="priority-card">
      <div class="priority-title">⚡ Top priority contacts</div>
      ${top.map(c=>`<div class="p-row"><div><div class="p-name">${c.fname||''} ${c.lname||''}</div><div class="p-co">${c.company||''} · ${c.urgency||''}</div></div><div style="font-family:monospace;font-size:13px;color:${tierColor(c.tier)}">${c.score||'?'}/10</div></div>`).join('')}
    </div>
    <div class="priority-card" style="border-color:var(--border)">
      <div class="priority-title" style="color:var(--muted)">By category</div>
      ${cats.map(cat=>{const n=contacts.filter(c=>c.category===cat).length;if(!n)return'';return`<div class="p-row"><div class="p-name" style="text-transform:capitalize">${cat}</div><div style="font-family:monospace;font-size:12px;color:var(--muted)">${n}</div></div>`;}).join('')}
    </div>
    <button class="export-btn" onclick="exportExcel()" style="margin-top:4px">📊 Export to Excel</button>`;
}

// ─── INIT ─────────────────────────────────────────────────
dbxLoad().then(()=>{ updateBadge(); renderContacts(); });
</script>
