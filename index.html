<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BD Contact Radar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080A0F;--surface:#0E1118;--surface2:#151820;--surface3:#1C2030;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#F2F0E8;--muted:#7A7D8A;--dim:#3A3D4A;
  --gold:#D4A843;--gold2:#F0C060;--gold-dim:rgba(212,168,67,0.1);--gold-border:rgba(212,168,67,0.25);
  --teal:#3ECFB0;--teal-dim:rgba(62,207,176,0.1);
  --red:#E05C5C;--red-dim:rgba(224,92,92,0.08);
  --blue:#5B9CF6;--blue-dim:rgba(91,156,246,0.1);
  --amber:#F0A030;
}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 20%,rgba(212,168,67,0.04) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 10% 80%,rgba(62,207,176,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;min-height:100vh}
.header{padding:20px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.header-left{flex:1;min-width:0}
.header-right{display:flex;align-items:center;gap:8px}
.eyebrow{font-family:monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:4px}
.title{font-size:22px;font-weight:800;line-height:1.1}
.title span{color:var(--gold)}
.badge{background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:20px;padding:4px 12px;font-family:monospace;font-size:11px;color:var(--gold);display:inline-block}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.icon-btn:hover{border-color:var(--gold-border);color:var(--gold)}
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 20px;font-family:monospace;font-size:10px}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--dim)}
.sync-dot.ok{background:var(--teal)}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-top:8px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-family:monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 18px;border:none;border-bottom:2px solid transparent;cursor:pointer;background:none;white-space:nowrap;transition:color .2s,border-color .2s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.page{display:none;padding:16px 20px 100px}
.page.active{display:block}
.input-selector{display:flex;gap:6px;margin-bottom:14px}
.input-btn{flex:1;padding:10px 4px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-size:12px;font-family:inherit;cursor:pointer;transition:all .15s}
.input-btn:hover{border-color:var(--border2);background:var(--surface3)}
.input-btn.active{border-color:var(--gold-border);background:var(--gold-dim);color:var(--gold)}
.linkedin-input-area{display:none;margin-bottom:10px}
.linkedin-input-area.vis{display:block}
.image-input-area{display:block}
.image-input-area.hidden{display:none}
.scan-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.scan-zone{border:2px dashed var(--gold-border);border-radius:16px;padding:22px 12px;text-align:center;background:var(--gold-dim);cursor:pointer;position:relative;overflow:hidden;transition:background .2s}
.scan-zone:hover{background:rgba(212,168,67,.15)}
.scan-zone input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}
.scan-icon{font-size:30px;margin-bottom:6px;display:block}
.scan-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:2px}
.scan-sub{font-size:11px;color:var(--muted)}
.preview-wrap{position:relative;margin-bottom:12px;display:none}
.preview-wrap.vis{display:block}
.preview-img{width:100%;border-radius:12px;border:1px solid var(--border2);max-height:160px;object-fit:cover;display:block}
.clear-btn{position:absolute;top:8px;right:8px;background:var(--bg);border:1px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--muted);cursor:pointer;font-family:monospace}
.flabel{font-family:monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
.finput{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
.finput:focus{border-color:var(--gold-border)}
textarea.finput{resize:vertical;min-height:52px}
.fgroup{margin-bottom:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.full{grid-column:1/-1}
.source-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.src-btn{font-family:monospace;font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.src-btn.active{background:var(--gold-dim);border-color:var(--gold-border);color:var(--gold)}
.btn-main{width:100%;background:var(--gold);color:var(--bg);border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s,transform .1s;font-family:inherit}
.btn-main:hover{background:var(--gold2)}
.btn-main:active{transform:scale(.98)}
.btn-main:disabled{background:var(--dim);color:var(--muted);cursor:not-allowed}
.btn-ghost{width:100%;background:var(--surface3);color:var(--text);border:1px solid var(--border2);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit}
.btn-teal{width:100%;background:var(--teal-dim);color:var(--teal);border:1px solid rgba(62,207,176,.3);border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;font-family:inherit}
.btn-export{width:100%;background:var(--surface2);color:var(--teal);border:1px solid rgba(62,207,176,.3);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.btn-export:hover{background:var(--teal-dim)}
.progress-row{display:flex;gap:6px;margin:10px 0 4px}
.pstep{flex:1;height:3px;border-radius:2px;background:var(--surface3);transition:background .4s}
.pstep.done{background:var(--gold)}
.pstep.act{background:var(--amber);animation:blink 1s infinite}
.status-txt{font-family:monospace;font-size:11px;color:var(--muted);text-align:center;min-height:18px;margin-bottom:6px}
.divider{display:flex;align-items:center;gap:10px;margin:10px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border2)}
.divider span{font-family:monospace;font-size:9px;color:var(--dim)}
.manual-toggle{text-align:center;font-family:monospace;font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;margin:4px 0 8px}
.ext-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:14px;margin:12px 0;display:none}
.ext-card.vis{display:block}
.ext-label{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.section-label{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.ctx-divider{height:1px;background:var(--border2);margin:14px 0}
.linkedin-field{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;transition:border-color .2s}
.linkedin-field:focus-within{border-color:var(--gold-border)}
.linkedin-field .link-icon{color:var(--blue);font-size:13px}
.linkedin-field input{flex:1;background:none;border:none;color:var(--blue);font-size:13px;font-family:inherit;outline:none;min-width:0}
.linkedin-field input::placeholder{color:var(--dim)}
.custom-tag{font-family:monospace;font-size:10px;padding:4px 10px;border-radius:14px;background:var(--teal-dim);color:var(--teal);border:1px solid rgba(62,207,176,.25);display:inline-flex;align-items:center;gap:4px}
.custom-tag .remove{cursor:pointer;opacity:.6;font-size:12px;line-height:1}
.custom-tag .remove:hover{opacity:1}
.add-tag-btn{font-family:monospace;font-size:10px;padding:4px 10px;border-radius:14px;background:transparent;color:var(--teal);border:1px dashed rgba(62,207,176,.5);cursor:pointer;font-family:monospace}
.analysis-box{background:var(--surface2);border:1px solid var(--gold-border);border-radius:12px;padding:14px;margin-top:12px;display:none}
.analysis-box.vis{display:block}
.analysis-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.analysis-lbl{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}
.score-num{font-family:monospace;font-size:24px;font-weight:500}
.score-num small{font-size:11px;color:var(--muted)}
.analysis-body{font-size:13px;line-height:1.65}
.tags-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.atag{font-family:monospace;font-size:9px;padding:3px 8px;border-radius:4px;display:inline-block}
.tag-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(91,156,246,.25)}
.tag-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(62,207,176,.25)}
.tag-gold{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold-border)}
.search-inp{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px;font-family:inherit}
.search-inp::placeholder{color:var(--dim)}
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{font-family:monospace;font-size:10px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s}
.fbtn.active{background:var(--surface2);color:var(--text)}
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;border-left:3px solid var(--dim);transition:border-color .2s}
.contact-card.hot{border-left-color:var(--gold)}
.contact-card.warm{border-left-color:var(--amber)}
.contact-card.cold{border-left-color:var(--blue)}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px}
.c-name{font-size:15px;font-weight:700}
.c-score{font-family:monospace;font-size:13px;font-weight:500}
.c-co{font-size:13px;font-weight:600}
.c-role{font-size:12px;color:var(--muted);margin-bottom:6px}
.c-linkedin{font-size:11px;color:var(--blue);margin-top:4px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-meta{display:flex;flex-wrap:wrap;gap:4px}
.cmeta{font-family:monospace;font-size:9px;padding:2px 7px;border-radius:3px;background:var(--surface3);color:var(--muted)}
.cmeta.source{background:var(--gold-dim);color:var(--gold)}
.c-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.c-detail.open{display:block}
.c-detail p{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:3px}
.del-btn{font-family:monospace;font-size:10px;padding:5px 12px;border-radius:6px;border:1px solid rgba(224,92,92,.3);background:transparent;color:var(--red);cursor:pointer;margin-top:10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-num-big{font-size:28px;font-weight:800;line-height:1;margin-bottom:4px}
.stat-lbl{font-family:monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.priority-card{background:var(--surface);border:1px solid var(--gold-border);border-radius:12px;padding:14px;margin-bottom:10px}
.priority-title{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.p-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.p-row:last-child{border-bottom:none}
.p-name{font-weight:600}
.p-co{font-size:11px;color:var(--muted)}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:1.6}
.empty-icon{font-size:32px;margin-bottom:10px}
.dots{display:inline-flex;gap:4px;align-items:center}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--bg);animation:blink 1.2s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:13px;color:var(--text);font-family:monospace;z-index:999;display:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.vis{display:block}
.settings-overlay{display:none;position:fixed;inset:0;background:rgba(8,10,15,.92);z-index:500;justify-content:center;align-items:flex-end}
.settings-overlay.vis{display:flex}
.settings-panel{width:100%;max-width:480px;max-height:88vh;overflow-y:auto;background:var(--surface);border-radius:16px 16px 0 0;padding:20px;border-top:1px solid var(--border2);animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.settings-header h2{font-size:16px;font-weight:700;color:var(--gold)}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.settings-section{margin-bottom:20px}
.settings-section-title{font-family:monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.met-at-editor{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.met-at-item{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:14px;background:var(--gold-dim);color:var(--gold);font-size:11px;font-family:monospace;border:1px solid var(--gold-border)}
.met-at-item .remove{cursor:pointer;opacity:.6;font-size:13px;line-height:1}
.met-at-item .remove:hover{opacity:1}
.add-met-at{display:flex;gap:6px}
.add-met-at input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none}
.add-met-at input:focus{border-color:var(--gold-border)}
.add-met-at button{padding:8px 14px;border-radius:8px;border:1px solid rgba(62,207,176,.3);background:var(--teal-dim);color:var(--teal);font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">BD Intelligence</div>
      <div class="title">Contact <span>Radar</span></div>
    </div>
    <div class="header-right">
      <div class="badge" id="totalBadge">0 contacts</div>
      <button class="icon-btn" id="settingsBtn" onclick="toggleSettings()" title="Settings">⚙</button>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot ok" id="syncDot"></div>
    <span id="syncTxt" style="color:var(--teal)">Ready · Gemini AI · Sheets backup active</span>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('scan',this)">📷 Scan</button>
    <button class="tab" onclick="showTab('contacts',this)">Contacts</button>
    <button class="tab" onclick="showTab('summary',this)">Summary</button>
  </div>

  <!-- SCAN TAB -->
  <div class="page active" id="tab-scan">
    <!-- Input source selector (Decision 1) -->
    <div class="input-selector">
      <button class="input-btn active" id="mode-camera" onclick="setInputMode('camera')">📷 Camera</button>
      <button class="input-btn" id="mode-gallery" onclick="setInputMode('gallery')">🖼 Gallery</button>
      <button class="input-btn" id="mode-linkedin" onclick="setInputMode('linkedin')">🔗 URL</button>
    </div>

    <!-- Camera / Gallery input area -->
    <div class="image-input-area" id="imageInputArea">
      <div class="scan-btns" id="scanZone">
        <div class="scan-zone" id="cameraZone">
          <input type="file" accept="image/*" capture="environment" onchange="handleImage(event,'camera')">
          <span class="scan-icon">📷</span>
          <div class="scan-title">Take Photo</div>
          <div class="scan-sub">Open camera</div>
        </div>
        <div class="scan-zone" id="galleryZone">
          <input type="file" accept="image/*" onchange="handleImage(event,'gallery')">
          <span class="scan-icon">🖼️</span>
          <div class="scan-title">From Gallery</div>
          <div class="scan-sub">Pick from photos</div>
        </div>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" class="preview-img" src="" alt="">
        <button class="clear-btn" onclick="clearScan()">✕ Clear</button>
      </div>
      <button class="btn-main" id="scanBtn" onclick="processCard()">
        <span id="scanBtnTxt">✦ Scan &amp; Analyse</span>
      </button>
    </div>

    <!-- LinkedIn / URL input area (Decision 4: accept any URL) -->
    <div class="linkedin-input-area" id="linkedinInputArea">
      <div class="fgroup">
        <label class="flabel">Profile or Website URL</label>
        <input class="finput" id="urlInput" type="url" placeholder="https://linkedin.com/in/jane-doe or any URL">
      </div>
      <button class="btn-main" id="urlBtn" onclick="processUrl()">
        <span id="urlBtnTxt">✦ Analyse Contact</span>
      </button>
    </div>

    <div class="progress-row" id="progressRow" style="display:none">
      <div class="pstep" id="ps1"></div>
      <div class="pstep" id="ps2"></div>
      <div class="pstep" id="ps3"></div>
    </div>
    <div class="status-txt" id="statusTxt"></div>

    <!-- Manual entry (image modes only) -->
    <div id="manualSection">
      <div class="divider"><span>or enter manually</span></div>
      <div class="manual-toggle" onclick="toggleManual()">▸ Type details instead</div>
      <div id="manualFields" style="display:none">
        <div class="grid2">
          <div><label class="flabel">First Name *</label><input class="finput" id="m_fname" placeholder="Argyri"></div>
          <div><label class="flabel">Last Name</label><input class="finput" id="m_lname" placeholder="Manglari"></div>
          <div class="full"><label class="flabel">Company *</label><input class="finput" id="m_company" placeholder="Tools for Brokers"></div>
          <div class="full"><label class="flabel">Job Title *</label><input class="finput" id="m_title" placeholder="Head of APAC BD"></div>
          <div><label class="flabel">Email</label><input class="finput" id="m_email" placeholder="a@tfb.com"></div>
          <div><label class="flabel">Phone</label><input class="finput" id="m_phone" placeholder="+65..."></div>
        </div>
        <button class="btn-ghost" id="manualBtn" onclick="runManual()">✦ Analyse</button>
      </div>
    </div>

    <!-- Extracted contact form with Context section (Decision 3) -->
    <div class="ext-card" id="extCard">
      <div class="ext-label">✓ Extracted — edit if needed</div>
      <div class="section-label">Contact Details</div>
      <div class="grid2">
        <div><label class="flabel">First Name</label><input class="finput" id="e_fname"></div>
        <div><label class="flabel">Last Name</label><input class="finput" id="e_lname"></div>
        <div class="full"><label class="flabel">Company</label><input class="finput" id="e_company"></div>
        <div class="full"><label class="flabel">Job Title</label><input class="finput" id="e_title"></div>
        <div><label class="flabel">Email</label><input class="finput" id="e_email"></div>
        <div><label class="flabel">Phone</label><input class="finput" id="e_phone"></div>
        <div class="full"><label class="flabel">Website</label><input class="finput" id="e_web"></div>
      </div>

      <div class="ctx-divider"></div>
      <div class="section-label">Context</div>

      <div class="fgroup">
        <label class="flabel">LinkedIn / Source URL</label>
        <div class="linkedin-field">
          <span class="link-icon">🔗</span>
          <input type="text" id="e_linkedin" placeholder="linkedin.com/in/...">
        </div>
      </div>

      <div class="fgroup">
        <label class="flabel">Met At</label>
        <div class="source-row" id="metAtChips"></div>

// ── GEMINI API ─────────────────────────────────────────────────
function parseJSON(text) {
  const c = text.replace(/```json|```/g,'').trim();
  try { return JSON.parse(c); } catch {}
  const s=c.indexOf('{'), e=c.lastIndexOf('}');
  if(s!==-1&&e!==-1) try{return JSON.parse(c.slice(s,e+1));}catch{}
  const g  = k => { const m=c.match(new RegExp(`"${k}"\\s*:\\s*"([^"]*)"`, 'i')); return m?m[1]:''; };
  const gn = k => { const m=c.match(new RegExp(`"${k}"\\s*:\\s*(\\d+)`, 'i')); return m?parseInt(m[1]):5; };
  const ga = k => { const m=c.match(new RegExp(`"${k}"\\s*:\\s*\\[([^\\]]+)\\]`, 'i')); if(!m) return []; return m[1].match(/"([^"]+)"/g)?.map(x=>x.replace(/"/g,''))||[]; };
  return {fname:g('fname'),lname:g('lname'),company:g('company'),title:g('title'),email:g('email'),phone:g('phone'),website:g('website'),score:gn('score'),tier:g('tier')||'warm',category:g('category')||'other',company_overview:g('company_overview')||'',opportunity:g('opportunity')||'',summary:g('summary')||'',next_action:g('next_action')||'Follow up',tags:ga('tags'),pelican_fit:g('pelican_fit')||'maybe',tc_fit:g('tc_fit')||'maybe',urgency:g('urgency')||'this month'};
}

async function gemini(parts) {
  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts }],
      generationConfig: { temperature: 0.1, maxOutputTokens: 1024 }
    })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates[0].content.parts[0].text;
}

async function geminiWithSearch(prompt) {
  const res = await fetch(GEMINI_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      tools: [{ google_search: {} }],
      generationConfig: { temperature: 0.2, maxOutputTokens: 2048 }
    })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  const parts = d.candidates[0].content.parts || [];
  return parts.map(p => p.text || '').join('');
}

      { text: 'Extract all contact information from this business card image. Return ONLY a JSON object with these exact keys (use empty string if not visible): {"fname":"","lname":"","company":"","title":"","email":"","phone":"","website":"","linkedin":""}. No markdown, no explanation, just the JSON.' }
    ]);

function renderScoreCard(result) {
  const tc = result.tier==='hot'?'var(--gold2)':result.tier==='warm'?'var(--amber)':'var(--blue)';
  document.getElementById('scoreNum').innerHTML = `${result.score||'?'}<small>/10</small>`;
  document.getElementById('scoreNum').style.color = tc;

  const urgIcon = result.urgency==='this week'?'🔴':result.urgency==='this month'?'🟡':'🔵';
  const urgTxt  = result.urgency==='this week'?'Follow up this week':result.urgency==='this month'?'Follow up this month':'Low urgency';
  document.getElementById('analysisBody').innerHTML =
    `<span style="font-family:monospace;font-size:11px;color:var(--muted)">${urgIcon} ${urgTxt}</span><br><br>` +
    (result.company_overview ? `<div style="background:var(--surface3);border-radius:8px;padding:10px 12px;margin-bottom:10px"><span style="font-family:monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)">Company</span><br><span style="font-size:12px;color:var(--muted);line-height:1.6">${result.company_overview}</span></div>` : '') +
    (result.opportunity ? `<div style="background:var(--gold-dim);border:1px solid var(--gold-border);border-radius:8px;padding:10px 12px;margin-bottom:10px"><span style="font-family:monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)">Opportunity</span><br><span style="font-size:12px;color:var(--text);line-height:1.6">${result.opportunity}</span></div>` : '') +
    `<strong style="color:var(--text)">Next: ${result.next_action||'Follow up'}</strong><br><br>` +
    `<span style="color:var(--muted)">${result.summary||''}</span>`;

  const tr = document.getElementById('tagsRow'); tr.innerHTML='';
  (result.tags||[]).forEach(t=>{const s=document.createElement('span');s.className='atag tag-blue';s.textContent=t;tr.appendChild(s);});
  if(result.pelican_fit==='yes'){const s=document.createElement('span');s.className='atag tag-teal';s.textContent='✓ Pelican fit';tr.appendChild(s);}
  if(result.tc_fit==='yes'){const s=document.createElement('span');s.className='atag tag-gold';s.textContent='✓ TC fit';tr.appendChild(s);}
  document.getElementById('analysisBox').classList.add('vis');
}

  showTab('contacts', document.querySelectorAll('.tab')[1]);

}

  if(!contacts.length){alert('No contacts to export yet');return;}
  const headers=['First Name','Last Name','Company','Job Title','Email','Phone','Website','LinkedIn URL','Score','Tier','Category','Pelican Fit','TC Fit','Urgency','Next Action','AI Summary','Met At','Source Type','Custom Tags','Notes','Date Added'];
  const rows=contacts.map(c=>[c.fname||'',c.lname||'',c.company||'',c.title||'',c.email||'',c.phone||'',c.website||'',c.linkedin_url||'',c.score||'',c.tier||'',c.category||'',c.pelican_fit||'',c.tc_fit||'',c.urgency||'',c.next_action||'',c.summary||'',c.met_at||c.source||'',c.source_type||'',(c.custom_tags||[]).join(', '),c.notes||'',c.savedAt||'']);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=[{wch:12},{wch:12},{wch:22},{wch:26},{wch:26},{wch:14},{wch:22},{wch:30},{wch:7},{wch:7},{wch:10},{wch:12},{wch:8},{wch:14},{wch:36},{wch:50},{wch:14},{wch:10},{wch:24},{wch:30},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'BD Contacts');
  XLSX.writeFile(wb,`BD-Contacts-${new Date().toISOString().slice(0,10)}.xlsx`);
  toast('📊 Excel downloaded');
}

// ── SETTINGS ───────────────────────────────────────────────────
function toggleSettings() {
  const ov = document.getElementById('settingsOverlay');
  const opening = !ov.classList.contains('vis');
  if (opening) {
    document.getElementById('s_company').value = settings.company_name;
    document.getElementById('s_products').value = settings.products;
    document.getElementById('s_industry').value = settings.industry_focus;
    document.getElementById('s_profile').value = settings.partner_profile;
    renderMetAtEditor();
  }
  ov.classList.toggle('vis', opening);
}

function saveSettings() {
  settings.company_name    = document.getElementById('s_company').value.trim()  || DEFAULT_SETTINGS.company_name;
  settings.products        = document.getElementById('s_products').value.trim();
  settings.industry_focus  = document.getElementById('s_industry').value.trim();
  settings.partner_profile = document.getElementById('s_profile').value.trim();
  if (!settings.met_at_presets.length) settings.met_at_presets = [...DEFAULT_SETTINGS.met_at_presets];
  persistSettings();
  toggleSettings();
  renderMetAtChips();
  toast('✓ Settings saved');
}

function resetSettings() {
  if (!confirm('Reset all settings to defaults?')) return;
  settings = { ...DEFAULT_SETTINGS, met_at_presets: [...DEFAULT_SETTINGS.met_at_presets] };
  persistSettings();
  document.getElementById('s_company').value = settings.company_name;
  document.getElementById('s_products').value = settings.products;
  document.getElementById('s_industry').value = settings.industry_focus;
  document.getElementById('s_profile').value = settings.partner_profile;
  renderMetAtEditor();
  renderMetAtChips();
  toast('Settings reset to defaults');
}

function renderMetAtEditor() {
  const ed = document.getElementById('metAtEditor');
  if (!ed) return;
  if (!settings.met_at_presets.length) {
    ed.innerHTML = '<span style="font-size:11px;color:var(--dim);font-family:monospace">No presets — add one below</span>';
    return;
  }
  ed.innerHTML = settings.met_at_presets.map((p,i) =>
    `<div class="met-at-item">${escapeHtml(p)}<span class="remove" onclick="removeMetAtPreset(${i})">×</span></div>`
  ).join('');
}

function addMetAtPreset() {
  const inp = document.getElementById('newMetAt');
  const val = inp.value.trim();
  if (!val) return;
  if (settings.met_at_presets.includes(val)) { toast('Already in list'); return; }
  settings.met_at_presets.push(val);
  inp.value = '';
  renderMetAtEditor();
}

function removeMetAtPreset(idx) {
  settings.met_at_presets.splice(idx, 1);
  renderMetAtEditor();
}

// ── MET-AT CHIPS (in contact form) ─────────────────────────────
function renderMetAtChips() {
  const row = document.getElementById('metAtChips');
  if (!row) return;
  if (!settings.met_at_presets.length) {
    row.innerHTML = '<span style="font-size:11px;color:var(--dim);font-family:monospace">No presets — add in ⚙ Settings</span>';
    return;
  }
  row.innerHTML = settings.met_at_presets.map(p => {
    const safe = escapeAttr(p);
    const cls = (p === currentMetAt) ? 'src-btn active' : 'src-btn';
    return `<button type="button" class="${cls}" onclick="selectMetAt(this,'${safe}')">${escapeHtml(p)}</button>`;
  }).join('');
}

function selectMetAt(btn, val) {
  if (currentMetAt === val) {
    currentMetAt = '';
    btn.classList.remove('active');
    return;
  }
  document.querySelectorAll('#metAtChips .src-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMetAt = val;
}

// ── CUSTOM TAGS (in contact form) ──────────────────────────────
function renderCustomTags() {
  const row = document.getElementById('customTagsRow');
  if (!row) return;
  const chips = currentCustomTags.map((t,i) =>
    `<span class="custom-tag">${escapeHtml(t)}<span class="remove" onclick="removeCustomTag(${i})">×</span></span>`
  ).join('');
  row.innerHTML = chips + `<button type="button" class="add-tag-btn" onclick="addCustomTag()">+ Add tag</button>`;
}

function addCustomTag() {
  const name = prompt('Tag name:');
  if (!name) return;
  const tag = name.trim();
  if (!tag) return;
  if (currentCustomTags.includes(tag)) return;
  currentCustomTags.push(tag);
  renderCustomTags();
}

function removeCustomTag(idx) {
  currentCustomTags.splice(idx, 1);
  renderCustomTags();
}

// ── UI HELPERS ─────────────────────────────────────────────────
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escapeAttr(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function setStep(n){['ps1','ps2','ps3'].forEach((id,i)=>{const el=document.getElementById(id);if(n===0){el.className='pstep';return;}el.className='pstep'+(i+1<n?' done':i+1===n?' act':'');});}
function setStatus(msg){document.getElementById('statusTxt').textContent=msg;}
function setBusy(b, which){
  const txtImg='✦ Scan &amp; Analyse';
  const txtUrl='✦ Analyse Contact';
  if (which === 'url') {
    const btn=document.getElementById('urlBtn'); btn.disabled=b;
    document.getElementById('urlBtnTxt').innerHTML=b?'<div class="dots"><span></span><span></span><span></span></div>':txtUrl;
  } else {
    const btn=document.getElementById('scanBtn'); btn.disabled=b;
    document.getElementById('scanBtnTxt').innerHTML=b?'<div class="dots"><span></span><span></span><span></span></div>':txtImg;
  }
}
function showTab(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');if(btn)btn.classList.add('active');if(id==='contacts')renderContacts();if(id==='summary')renderSummary();}
function setFilter(btn,val){document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=val;renderContacts(document.querySelector('.search-inp')?.value||'');}
function toggleManual(){const mf=document.getElementById('manualFields');const open=mf.style.display==='none';mf.style.display=open?'block':'none';document.querySelector('.manual-toggle').textContent=(open?'▾':'▸')+' Type details instead';}
function updateBadge(){document.getElementById('totalBadge').textContent=contacts.length+' contact'+(contacts.length!==1?'s':'');}
function tierColor(t){return t==='hot'?'var(--gold)':t==='warm'?'var(--amber)':'var(--blue)';}
function tierIcon(t){return t==='hot'?'🔥':t==='warm'?'⚡':'❄️';}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('vis');setTimeout(()=>el.classList.remove('vis'),2500);}

// ── CONTACTS LIST ──────────────────────────────────────────────
function renderContacts(search=''){
  const list=document.getElementById('contactsList');
  let f=contacts;
  if(currentFilter!=='all')f=f.filter(c=>c.tier===currentFilter||c.category===currentFilter);
  if(search){const s=search.toLowerCase();f=f.filter(c=>((c.fname||'')+' '+(c.lname||'')+' '+(c.company||'')+' '+(c.title||'')+' '+(c.custom_tags||[]).join(' ')).toLowerCase().includes(s));}
  if(!f.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">${contacts.length?'🔍':'📇'}</div>${contacts.length?'No contacts match this filter':'No contacts yet. Scan your first namecard!'}</div>`;return;}
  list.innerHTML=f.map(c=>{
    const allTags = [...(c.tags||[]), ...(c.custom_tags||[])].slice(0,4);
    const metAt = c.met_at || c.source || '';
    return `
    <div class="contact-card ${c.tier||'cold'}" onclick="toggleCard(${c.id})">
      <div class="c-top"><div class="c-name">${escapeHtml(c.fname||'')} ${escapeHtml(c.lname||'')}</div><div class="c-score" style="color:${tierColor(c.tier)}">${tierIcon(c.tier)} ${c.score||'?'}/10</div></div>
      <div class="c-co">${escapeHtml(c.company||'')}</div>
      <div class="c-role">${escapeHtml(c.title||'')}</div>
      ${c.linkedin_url?`<div class="c-linkedin">🔗 ${escapeHtml(c.linkedin_url.replace(/^https?:\/\//,''))}</div>`:''}
      <div class="c-meta">
        ${allTags.map(t=>`<span class="cmeta">${escapeHtml(t)}</span>`).join('')}
        ${c.pelican_fit==='yes'?'<span class="cmeta" style="background:var(--teal-dim);color:var(--teal)">Pelican</span>':''}
        ${metAt?`<span class="cmeta source">${escapeHtml(metAt)}</span>`:''}
        <span class="cmeta">${escapeHtml(c.savedAt||'')}</span>
      </div>
      <div class="c-detail" id="det-${c.id}">
        <p>${escapeHtml(c.summary||'')}</p>
        <p style="color:var(--gold);margin-top:6px"><strong>Next:</strong> ${escapeHtml(c.next_action||'')}</p>
        ${c.email?`<p>✉ ${escapeHtml(c.email)}</p>`:''}
        ${c.phone?`<p>📞 ${escapeHtml(c.phone)}</p>`:''}
        ${c.website?`<p>🔗 ${escapeHtml(c.website)}</p>`:''}
        ${c.linkedin_url?`<p>🔗 <a href="${escapeAttrUrl(c.linkedin_url)}" target="_blank" rel="noopener" style="color:var(--blue)" onclick="event.stopPropagation()">${escapeHtml(c.linkedin_url)}</a></p>`:''}
        ${c.notes?`<p style="color:var(--dim);margin-top:4px">Notes: ${escapeHtml(c.notes)}</p>`:''}
        <button class="del-btn" onclick="deleteContact(event,'${c.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function escapeAttrUrl(s){return String(s).replace(/"/g,'%22');}

function toggleCard(id){const d=document.getElementById('det-'+id);if(d)d.classList.toggle('open');}

function deleteContact(e,id){
  e.stopPropagation();
  if(!confirm('Delete this contact?'))return;
  const contact=contacts.find(c=>String(c.id)===String(id));
  contacts=contacts.filter(c=>String(c.id)!==String(id));
  saveLocal();
  if(contact)sheetDelete(contact);
  updateBadge();
  renderContacts();
  toast('Deleted');
}

// ── SUMMARY ────────────────────────────────────────────────────
function renderSummary(){
  const el=document.getElementById('summaryContent');
  if(!contacts.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">📊</div>Add contacts to see your pipeline summary</div>';return;}
  const hot=contacts.filter(c=>c.tier==='hot');
  const warm=contacts.filter(c=>c.tier==='warm');
  const pel=contacts.filter(c=>c.pelican_fit==='yes');
  const urg=contacts.filter(c=>c.urgency==='this week');
  const top=[...contacts].sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,5);
  const sources={};
  contacts.forEach(c=>{const m=c.met_at||c.source;if(m)sources[m]=(sources[m]||0)+1;});
  const sourceList=Object.entries(sources).sort((a,b)=>b[1]-a[1]).slice(0,6);
  el.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num-big" style="color:var(--gold)">${hot.length}</div><div class="stat-lbl">🔥 Hot</div></div>
      <div class="stat-card"><div class="stat-num-big" style="color:var(--amber)">${warm.length}</div><div class="stat-lbl">⚡ Warm</div></div>
      <div class="stat-card"><div class="stat-num-big" style="color:var(--teal)">${pel.length}</div><div class="stat-lbl">Pelican fits</div></div>
      <div class="stat-card"><div class="stat-num-big" style="color:var(--red)">${urg.length}</div><div class="stat-lbl">🔴 Urgent</div></div>
    </div>
    <div class="priority-card">
      <div class="priority-title">⚡ Priority follow-ups</div>
      ${top.map(c=>`<div class="p-row"><div><div class="p-name">${escapeHtml(c.fname||'')} ${escapeHtml(c.lname||'')}</div><div class="p-co">${escapeHtml(c.company||'')} · ${escapeHtml(c.urgency||'')}</div></div><div style="font-family:monospace;font-size:13px;color:${tierColor(c.tier)}">${c.score||'?'}/10</div></div>`).join('')}
    </div>
    ${sourceList.length?`<div class="priority-card" style="border-color:var(--border)">
      <div class="priority-title" style="color:var(--muted)">Top sources</div>
      ${sourceList.map(([k,v])=>`<div class="p-row"><div class="p-name">${escapeHtml(k)}</div><div style="font-family:monospace;font-size:12px;color:var(--gold)">${v}</div></div>`).join('')}
    </div>`:''}
    <div class="priority-card" style="border-color:var(--border)">
      <div class="priority-title" style="color:var(--muted)">By category</div>
      ${['broker','tech','lp','crm','media','other'].map(cat=>{const n=contacts.filter(c=>c.category===cat).length;if(!n)return'';return`<div class="p-row"><div class="p-name" style="text-transform:capitalize">${cat}</div><div style="font-family:monospace;font-size:12px;color:var(--muted)">${n}</div></div>`;}).join('')}
    </div>
    <button class="btn-export" onclick="exportExcel()" style="margin-top:4px">📊 Export to Excel</button>`;
}

// ── INIT ───────────────────────────────────────────────────────
loadSettings();
loadContacts();
renderMetAtChips();
renderCustomTags();
</script>
